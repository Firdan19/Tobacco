name: Build CloudOS Kernel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview, rustfmt
      - run: cargo fmt --check
      - name: Install GRUB ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin xorriso mtools
      - run: RUSTFLAGS="-C link-arg=-Tlinker.ld" cargo build --release --target x86_64-unknown-none.json -Z build-std=core,compiler_builtins -Z build-std-features=compiler-builtins-mem -Zjson-target-spec
      - name: Prepare ISO root
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/cloudos-kernel iso/boot/cloudos-kernel
          cp grub.cfg iso/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 ISO
        run: grub-mkrescue -o cloudos.iso iso
      - uses: actions/upload-artifact@v4
        with:
          name: cloudos-iso
          path: cloudos.iso
