name: Build CloudOS Kernel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview
      - run: RUSTFLAGS="-C link-arg=-Tlinker.ld" cargo build --release --target x86_64-unknown-none.json -Z build-std=core,compiler_builtins -Z build-std-features=compiler-builtins-mem
      - run: cp target/x86_64-unknown-none/release/cloudos-kernel bootimage.bin
      - uses: actions/upload-artifact@v4
        with:
          name: cloudos-bootimage
          path: bootimage.bin
