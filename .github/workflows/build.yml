name: Build Tobacco Kernel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview, rustfmt
      - run: cargo fmt --check
      - name: Install GRUB ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin xorriso mtools nasm
      - name: Assemble interrupt stubs
        run: |
          mkdir -p target
          nasm -f elf64 src/interrupts.asm -o target/interrupts.o
      - name: Build release kernel
        env:
          TOBACCO_GIT_COMMIT: ${{ github.sha }}
          TOBACCO_BUILD_PROFILE: release
          TOBACCO_BUILD_TARGET: x86_64-unknown-none.json
          TOBACCO_BUILD_FEATURES: none
          TOBACCO_BUILD_TOOLCHAIN: nightly
        run: |
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          export TOBACCO_BUILD_TIME="$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%dT%H:%M:%SZ")"
          RUSTFLAGS="-C link-arg=-Tlinker.ld -C link-arg=$PWD/target/interrupts.o" cargo build --release --target x86_64-unknown-none.json -Z build-std=core,compiler_builtins -Z build-std-features=compiler-builtins-mem -Zjson-target-spec
      - name: Prepare ISO root
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/tobacco-kernel iso/boot/tobacco-kernel
          cp grub.cfg iso/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 ISO
        run: grub-mkrescue -o tobacco.iso iso
      - name: Prepare CI kernel test ISOs
        run: |
          for mode in shell syscall userfault heap keyboard pagefault doublefault; do
            mkdir -p "iso-ci-${mode}/boot/grub"
            cp target/x86_64-unknown-none/release/tobacco-kernel "iso-ci-${mode}/boot/tobacco-kernel"
            cp "scripts/grub-ci-${mode}.cfg" "iso-ci-${mode}/boot/grub/grub.cfg"
            grub-mkrescue -o "tobacco-ci-${mode}.iso" "iso-ci-${mode}"
          done
      - name: Upload CI kernel test images
        uses: actions/upload-artifact@v4
        with:
          name: tobacco-ci-images
          path: |
            tobacco.iso
            tobacco-ci-shell.iso
            tobacco-ci-syscall.iso
            tobacco-ci-userfault.iso
            tobacco-ci-heap.iso
            tobacco-ci-keyboard.iso
            tobacco-ci-pagefault.iso
            tobacco-ci-doublefault.iso
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: tobacco-iso
          path: tobacco.iso

  kernel-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - boot-normal
          - shell-command-smoke
          - syscall-probe
          - user-page-fault
          - heap-stress
          - keyboard-model
          - panic-fault-screen
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86
      - uses: actions/download-artifact@v4
        with:
          name: tobacco-ci-images
          path: ci-images
      - name: Run kernel test matrix
        run: sh scripts/ci-kernel-test.sh "${{ matrix.suite }}" ci-images 12
      - name: Upload serial matrix log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tobacco-serial-${{ matrix.suite }}
          path: serial-${{ matrix.suite }}*.log
          if-no-files-found: ignore
